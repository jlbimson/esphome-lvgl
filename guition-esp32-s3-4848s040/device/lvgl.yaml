# LVGL Integration Configuration
lvgl:
  # Set your display driver reference ID here
  displays:
    - display_id: my_display
  
  # Configure your touch driver reference ID here
  touches:
    - touch_id: my_touch

  # Custom design styles
  style_definitions:
    - id: style_btn
      bg_color: 0x2196F3
      bg_grad_color: 0x1976D2
      bg_grad_dir: VER
      text_color: 0xFFFFFF
      border_width: 0
      radius: 8
    - id: style_btn_pressed
      bg_color: 0x1976D2
      bg_grad_color: 0x0D47A1

  # Use 'pages' to prevent top-level 'widgets' conflicts
  pages:
    - id: climate_page
      bg_color: 0x121212 # Sleek Dark Mode Background
      widgets:
        
        # --- TITLE LABEL ---
        - label:
            text: "CLIMATE CONTROL"
            align: TOP_MID
            y: 15
            text_color: 0xFFFFFF

        # --- TEMPERATURE ARC (DIAL) ---
        - arc:
            id: temp_arc
            x: -80
            y: 20
            width: 180
            height: 180
            align: CENTER
            range_min: 17
            range_max: 30
            value: 21
            adjustable: true
            on_value_changed:
              then:
                - homeassistant.service:
                    service: climate.set_temperature
                    data:
                      entity_id: climate.electrical_gh_ac
                      temperature: !lambda "return String(x).c_str();"
                - lvgl.label.update:
                    id: temp_label
                    format: "%.0f°C"
                    args: [ 'x' ]

        # --- CENTER TEMPERATURE VALUE ---
        - label:
            id: temp_label
            text: "21°C"
            align: CENTER
            x: -80
            y: 20
            text_color: 0xFFFFFF
            font: montserrat_32

        # --- MINUS BUTTON ---
        - button:
            id: btn_temp_down
            x: -180
            y: 110
            width: 60
            height: 50
            align: CENTER
            styles: [style_btn, style_btn_pressed]
            widgets:
              - label: 
                  text: "-" 
                  align: CENTER 
                  text_color: 0xFFFFFF 
                  font: montserrat_22
            on_click:
              then:
                - lambda: |-
                    auto arc = id(temp_arc);
                    float cur = arc.get_value();
                    if (cur > 17) {
                      float new_temp = cur - 1;
                      arc.set_value(new_temp);
                      id(temp_label).set_text( (String((int)new_temp) + "°C").c_str() );
                      auto call = arch->get_api()->make_call("climate.set_temperature");
                      call.set_data("entity_id", "climate.electrical_gh_ac");
                      call.set_data("temperature", String((int)new_temp).c_str());
                      call.perform();
                    }

        # --- PLUS BUTTON ---
        - button:
            id: btn_temp_up
            x: 20
            y: 110
            width: 60
            height: 50
            align: CENTER
            styles: [style_btn, style_btn_pressed]
            widgets:
              - label: 
                  text: "+" 
                  align: CENTER 
                  text_color: 0xFFFFFF 
                  font: montserrat_22
            on_click:
              then:
                - lambda: |-
                    auto arc = id(temp_arc);
                    float cur = arc.get_value();
                    if (cur < 30) {
                      float new_temp = cur + 1;
                      arc.set_value(new_temp);
                      id(temp_label).set_text( (String((int)new_temp) + "°C").c_str() );
                      auto call = arch->get_api()->make_call("climate.set_temperature");
                      call.set_data("entity_id", "climate.electrical_gh_ac");
                      call.set_data("temperature", String((int)new_temp).c_str());
                      call.perform();
                    }

        # --- CONTROL SIDE PANEL (RIGHT SIDE) ---

        # COOL MODE BUTTON
        - button:
            id: btn_cool
            x: 140
            y: -80
            width: 100
            height: 45
            align: CENTER
            styles: [style_btn, style_btn_pressed]
            widgets:
              - label: 
                  text: "COOL" 
                  align: CENTER 
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.service:
                    service: climate.set_hvac_mode
                    data:
                      entity_id: climate.electrical_gh_ac
                      hvac_mode: "cool"

        # HEAT MODE BUTTON
        - button:
            id: btn_heat
            x: 140
            y: -25
            width: 100
            height: 45
            align: CENTER
            styles: [style_btn, style_btn_pressed]
            widgets:
              - label: 
                  text: "HEAT" 
                  align: CENTER 
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.service:
                    service: climate.set_hvac_mode
                    data:
                      entity_id: climate.electrical_gh_ac
                      hvac_mode: "heat"

        # OFF BUTTON
        - button:
            id: btn_off
            x: 140
            y: 30
            width: 100
            height: 45
            align: CENTER
            bg_color: 0xD32F2F # Soft Red for Power Off
            widgets:
              - label: 
                  text: "POWER OFF" 
                  align: CENTER 
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.service:
                    service: climate.set_hvac_mode
                    data:
                      entity_id: climate.electrical_gh_ac
                      hvac_mode: "off"

        # --- FAN SPEED SELECT (DROPDOWN) ---
        - dropdown:
            id: fan_dropdown
            x: 140
            y: 90
            width: 120
            height: 40
            align: CENTER
            options:
              - "auto"
              - "low"
              - "medium"
              - "high"
            on_value_changed:
              then:
                - homeassistant.service:
                    service: climate.set_fan_mode
                    data:
                      entity_id: climate.electrical_gh_ac
                      fan_mode: !lambda "return x;"

        # --- REAL-TIME STATUS DISPLAY ---
        - label:
            id: mode_label
            text: "Mode: Unknown"
            x: -180
            y: -110
            align: CENTER
            text_color: 0xAAAAAA
            font: montserrat_14

        - label:
            id: fan_label
            text: "Fan: Unknown"
            x: -60
            y: -110
            align: CENTER
            text_color: 0xAAAAAA
            font: montserrat_14