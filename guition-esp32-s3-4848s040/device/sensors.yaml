sensor:
  - platform: homeassistant
    id: current_temperature
    entity_id: climate.electrical_gh_ac
    attribute: current_temperature

  - platform: homeassistant
    id: target_temperature
    entity_id: climate.electrical_gh_ac
    attribute: temperature
    on_value:
      then:
        - lvgl.arc.update:
            id: temp_arc
            value: !lambda "return x;"
        - lvgl.label.update:
            id: temp_label
            text:
              format: "%.0f°F"
              args: [ 'x * 1.8 + 32' ]

text_sensor:
  - platform: homeassistant
    id: climate_mode
    entity_id: climate.electrical_gh_ac
    on_value:
      then:
        - lvgl.label.update:
            id: mode_label
            text:
              format: "Mode: %s"
              args: [ 'x.c_str()' ]

  - platform: homeassistant
    id: climate_fan_mode
    entity_id: climate.electrical_gh_ac
    on_value:
      then:
        - lvgl.label.update:
            id: fan_label
            text:
              format: "Fan: %s"
              args: [ 'x.c_str()' ]