sensor:
  # Imports the current room temperature from your Home Assistant climate entity
  - platform: homeassistant
    id: current_temperature
    entity_id: climate.electrical_gh_ac
    attribute: current_temperature

  # Imports the target temperature (for displaying the active setting)
  - platform: homeassistant
    id: target_temperature
    entity_id: climate.electrical_gh_ac
    attribute: temperature
    on_value:
      then:
        - lvgl.arc.set_value:
            id: temp_arc
            value: !lambda "return x;"
        - lvgl.label.update:
            id: temp_label
            format: "%.0f°C"
            args: [ 'x' ]

text_sensor:
  # Imports the current operation mode (cool, heat, off, auto)
  - platform: homeassistant
    id: climate_mode
    entity_id: climate.electrical_gh_ac
    on_value:
      then:
        - lvgl.label.update:
            id: mode_label
            format: "Mode: %s"
            args: [ 'x.c_str()' ]

  # Imports the current fan mode (low, medium, high, auto)
  - platform: homeassistant
    id: climate_fan_mode
    entity_id: climate.electrical_gh_ac
    on_value:
      then:
        - lvgl.label.update:
            id: fan_label
            format: "Fan: %s"
            args: [ 'x.c_str()' ]